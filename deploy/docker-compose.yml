# ============================================================
# Pulse — standalone production deployment.
# Uses pre-built images (no source build) and a self-migrating backend.
# Configure via the .env file next to this one (see install.sh / README).
#
#   docker compose up -d
# ============================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metrics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-metrics_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metrics}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-metrics}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?set CLICKHOUSE_PASSWORD in .env}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-metrics_db}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    image: ghcr.io/roman0309/pulse-backend:${PULSE_VERSION:-latest}
    container_name: pulse-backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - POSTGRES_DSN=postgres://${POSTGRES_USER:-metrics}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-metrics_db}?sslmode=disable
      - CLICKHOUSE_DSN=clickhouse://${CLICKHOUSE_USER:-metrics}:${CLICKHOUSE_PASSWORD}@clickhouse:9000/${CLICKHOUSE_DB:-metrics_db}
      - JWT_SECRET=${JWT_SECRET:?set JWT_SECRET in .env}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET in .env}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost}
      - PUBLIC_INGEST_URL=${PUBLIC_INGEST_URL:-http://localhost:8080}
      - AGENT_IMAGE=${AGENT_IMAGE:-ghcr.io/roman0309/pulse-agent:latest}
      - SEED_DEMO=${SEED_DEMO:-false}
    ports:
      - "8080:8080"
    # The in-app "Update Pulse" button needs Docker access: mount the host
    # socket AND run as root so the (otherwise non-root) image can use it.
    # The socket already grants root-equivalent control of the host, so this
    # adds no extra risk. Remove both lines to disable self-update — server
    # management still works over SSH.
    user: "0:0"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  frontend:
    image: ghcr.io/roman0309/pulse-frontend:${PULSE_VERSION:-latest}
    container_name: pulse-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend

  # Optional: expose Pulse on your private Tailscale network — no domain, no
  # public ports, automatic HTTPS. Enable with:  docker compose --profile tailscale up -d
  # Pulse becomes reachable at https://<TS_HOSTNAME>.<your-tailnet>.ts.net
  tailscale:
    image: tailscale/tailscale:latest
    profiles: ["tailscale"]
    hostname: ${TS_HOSTNAME:-pulse}
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:-}
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:-}
    volumes:
      - ./tailscale/serve.json:/config/serve.json:ro
      - tailscale_state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    depends_on:
      - frontend

volumes:
  postgres_data:
  clickhouse_data:
  tailscale_state:
