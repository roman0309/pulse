name: 🐛 Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: How are you running Pulse, and which version/commit?
      placeholder: |
        - Deploy: docker compose / k8s / local
        - Commit/tag:
        - OS / browser:
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
    validations:
      required: false
